<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .chat-wrap { width: 420px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); overflow: hidden; }
  .chat-header { background: #185FA5; color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .bot-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header-text h2 { font-size: 16px; font-weight: 600; }
  .header-text p { font-size: 12px; opacity: 0.8; }
  .status-dot { width: 9px; height: 9px; border-radius: 50%; background: #22c55e; margin-left: auto; }
  .messages { height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #f8f9fb; }
  .msg { display: flex; gap: 8px; align-items: flex-end; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }
  .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
  .bot .bubble { background: #fff; border: 1px solid #e5e7eb; color: #111; border-bottom-left-radius: 4px; }
  .user .bubble { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .bot .msg-avatar { background: #dbeafe; }
  .user .msg-avatar { background: #185FA5; color: #fff; font-size: 11px; font-weight: 600; }
  .typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; }
  .typing span { width: 7px; height: 7px; background: #9ca3af; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px; background: #f8f9fb; border-top: 1px solid #e5e7eb; }
  .sug { padding: 5px 12px; border: 1px solid #d1d5db; border-radius: 14px; font-size: 12px; color: #374151; cursor: pointer; background: #fff; }
  .sug:hover { background: #f3f4f6; }
  .input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #e5e7eb; background: #fff; }
  input[type=text] { flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 20px; font-size: 14px; outline: none; font-family: inherit; }
  input[type=text]:focus { border-color: #185FA5; }
  button { padding: 10px 18px; background: #185FA5; color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; font-family: inherit; }
  button:hover { background: #0C447C; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="chat-wrap">
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="header-text">
      <h2>AI Chatbot</h2>
      <p>Powered by Gemini AI · AIT Creative Assignment</p>
    </div>
    <div class="status-dot"></div>
  </div>
  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar">🤖</div>
      <div class="bubble">Hi! I'm an AI Chatbot built for the AIT Creative Assignment (BAD402). Ask me anything about AI, technology, or anything else!</div>
    </div>
  </div>
  <div class="suggestions" id="suggestions">
    <span class="sug" onclick="sendSuggestion(this)">What is AI?</span>
    <span class="sug" onclick="sendSuggestion(this)">What is machine learning?</span>
    <span class="sug" onclick="sendSuggestion(this)">What can you do?</span>
    <span class="sug" onclick="sendSuggestion(this)">Tell me a fun fact</span>
  </div>
  <div class="input-row">
    <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()" />
    <button onclick="sendMessage()" id="sendBtn">Send</button>
  </div>
</div>
<script>
const API_KEY = 'AIzaSyBIDpyWHB7E59cjuT0oZfXP0gQbOWYhqek';
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const history = [];

function addMessage(text, role) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? '🤖' : 'You';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  sendBtn.disabled = true;
  document.getElementById('suggestions').style.display = 'none';
  addMessage(text, 'user');
  history.push({ role: 'user', parts: [{ text }] });
  showTyping();
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: 'You are a friendly AI chatbot built by a student at Acharya Institute of Technology, Bengaluru, as a creative assignment for Artificial Intelligence (BAD402). Keep responses concise, friendly, and helpful.' }] },
        contents: history
      })
    });
    const data = await res.json();
    const reply = data.candidates[0].content.parts[0].text;
    history.push({ role: 'model', parts: [{ text: reply }] });
    removeTyping();
    addMessage(reply, 'bot');
  } catch(e) {
    removeTyping();
    addMessage('Sorry, something went wrong. Please try again!', 'bot');
  }
  sendBtn.disabled = false;
  inputEl.focus();
}

function sendSuggestion(el) {
  inputEl.value = el.textContent;
  sendMessage();
}
</script>
</body>
</html>
